name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # os: [ubuntu-latest, macos-latest, windows-latest]
        # windows-latest disabled: esaxx-rs builds C++ with /MT (static CRT)
        # while lbug (KuzuDB) uses /MD (dynamic CRT), causing LNK2038 mismatch.
        os: [macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      # - name: Install cmake
      #   if: runner.os == 'Linux'
      #   run: sudo apt-get update && sudo apt-get install -y cmake
      - run: cargo clippy --all-targets -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # os: [ubuntu-latest, macos-latest, windows-latest]
        # windows-latest disabled: esaxx-rs /MT vs lbug /MD CRT mismatch (LNK2038)
        os: [macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # - name: Install cmake
      #   if: runner.os == 'Linux'
      #   run: sudo apt-get update && sudo apt-get install -y cmake
      - run: cargo test --all
